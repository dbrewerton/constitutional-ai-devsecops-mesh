services:
  ollama-server:
    image: ollama/ollama:latest
    container_name: ollama-core
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=4
    networks:
      - secure-agent-mesh
      - internet-ingress

  # High-Efficiency, Air-Gapped Local Speech Synthesis Service
  piper-server:
    image: linuxserver/piper:latest
    container_name: piper-core
    volumes:
      - piper-data:/config
    ports:
      - "5000:5000"
    command: --voice en_US-lessac-medium
    networks:
      - secure-agent-mesh
      - internet-ingress

  agent-orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: agent-orchestrator-core
    ports:
      - "8000:8000"
    volumes:
      - ./manifest:/app/manifest:ro
      - ./workspace:/app/workspace
    environment:
      - OLLAMA_HOST=http://ollama-server:11434
      - PIPER_HOST=http://piper-server:5000
    depends_on:
      - ollama-server
      - piper-server
    networks:
      - secure-agent-mesh
      - public-ingress

networks:
  secure-agent-mesh:
    driver: bridge
    internal: true
  internet-ingress:
    driver: bridge
  public-ingress:
    driver: bridge

volumes:
  ollama-data:
  piper-data:
