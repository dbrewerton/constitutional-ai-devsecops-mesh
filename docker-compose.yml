networks:
  # Strictly air-gapped internal mesh for the agents
  secure-agent-mesh:
    driver: bridge
    internal: true
  # Temporary ingress bridge for initial model pulls
  internet-ingress:
    driver: bridge
  # Public entry port for your host machine web browser / UI
  public-ingress:
    driver: bridge

volumes:
  ollama-data:

services:
  # Local Model Server
  ollama-server:
    image: ollama/ollama:latest
    container_name: ollama-core
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=4
    networks:
      - secure-agent-mesh
      - internet-ingress  # Allows initial model downloads

  # The Air-Gapped Multi-Agent Orchestrator
  agent-orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: agent-orchestrator-core
    ports:
      - "8000:8000"
    volumes:
      - ./manifest:/app/manifest:ro
    environment:
      - OLLAMA_HOST=http://ollama-server:11434
    depends_on:
      - ollama-server
    networks:
      - secure-agent-mesh # Can talk to Ollama, but has ZERO internet access
      - public-ingress     # Exposed safely only to your local host browser